<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSIC-PLAYER</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/57cc61c056.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="container">

        <div class="music-player">
            <nav>

                <div class="top-bar">
                    <i class="fa-solid fa-chevron-down"></i>
                    </div>


                    <div class="top-bar">
                   <i class="fa-solid fa-bars"></i> 
                </div>

                

            </nav>

    <img src="assets/Maclaren.jpg" class="song-img">
    <h1>Yellow Hearts</h1>
    <p>Ant Saunders</p>

    <audio src="assets/Ant Saunders - Yellow Hearts (Lyrics)(M4A_128K).m4a" ></audio>

    <input type="range" value="0" id="progress-bar">

    <div class="navigation">
                    <i class="fa-solid fa-shuffle"></i>
                    <i class="fa-solid fa-play" id="navigation-circle"></i>
                   <i class="fa-solid fa-repeat"></i> 
                </div>



    
        </div>

     </div>

                

   
    
    
  
    
</body>
</html>
